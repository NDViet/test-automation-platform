apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://platform-prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  - name: PostgreSQL
    type: postgres
    uid: platform-postgres
    url: platform-postgres:5432
    user: platform
    secureJsonData:
      password: platform
    jsonData:
      database: platform
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1700
      timescaledb: false

  - name: Loki
    type: loki
    uid: loki
    url: http://platform-loki:3100
    access: proxy
    jsonData:
      maxLines: 1000

  # K6 real-time metrics are stored in Prometheus (above), written via
  #   k6 run -o experimental-prometheus-rw \
  #     -e K6_PROMETHEUS_RW_SERVER_URL=http://localhost:9090/api/v1/write \
  #     -e K6_PROMETHEUS_RW_TREND_STATS="p(90),p(95),p(99),avg,med,min,max" ...
  # The "K6 Real-time Metrics" dashboard queries the Prometheus datasource.

  # Test execution logs — shipped by logstash-logback-encoder → Logstash → OpenSearch
  - name: OpenSearch
    type: grafana-opensearch-datasource
    uid: opensearch
    url: http://platform-opensearch:9200
    access: proxy
    jsonData:
      database: "test_execution_logs-*"
      timeField: "@timestamp"
      version: "3.0.0"        # Must match the OpenSearch server major version (3.5.0)
      flavor: opensearch
      logMessageField: message
      logLevelField: level
      maxConcurrentShardRequests: 5
      pplEnabled: true
