apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://platform-prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  - name: PostgreSQL
    type: postgres
    uid: platform-postgres
    url: platform-postgres:5432
    user: platform
    secureJsonData:
      password: platform
    jsonData:
      database: platform
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1700
      timescaledb: false

  - name: Loki
    type: loki
    uid: loki
    url: http://platform-loki:3100
    access: proxy
    jsonData:
      maxLines: 1000

  # K6 real-time metrics — streamed via k6 --out influxdb=http://localhost:8086/k6
  - name: InfluxDB-K6
    type: influxdb
    uid: influxdb-k6
    url: http://platform-influxdb:8086
    access: proxy
    jsonData:
      dbName: k6
      httpMode: GET
      timeInterval: 5s

  # Test execution logs — shipped by logstash-logback-encoder → Logstash → OpenSearch
  - name: OpenSearch
    type: grafana-opensearch-datasource
    uid: opensearch
    url: http://platform-opensearch:9200
    access: proxy
    jsonData:
      database: "test_execution_logs-*"
      timeField: "@timestamp"
      version: "3.0.0"        # Must match the OpenSearch server major version (3.5.0)
      flavor: opensearch
      logMessageField: message
      logLevelField: level
      maxConcurrentShardRequests: 5
      pplEnabled: true
