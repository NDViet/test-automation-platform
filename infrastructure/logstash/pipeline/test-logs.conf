##############################################################################
# Logstash pipeline — test execution logs
#
# Receives JSON log events from logstash-logback-encoder (TCP port 5000).
# Every log line produced during a test JVM run is tagged with MDC fields
# (run_id, testId, team_id, project_id, traceId, step) and indexed into
# OpenSearch under test_execution_logs-YYYY.MM.dd.
#
# Filter-by-run query:
#   GET /test_execution_logs-*/_search
#   { "query": { "term": { "run_id": "<uuid>" } } }
##############################################################################

input {
  tcp {
    port  => 5044
    codec => json_lines
  }
}

filter {
  # ── Timestamp ──────────────────────────────────────────────────────────────
  # logstash-logback-encoder sends @timestamp as a JSON timestamp; the tcp
  # codec parses it directly into a Logstash Timestamp object — no date filter
  # needed. Adding one causes _dateparsefailure because the field is already
  # a Timestamp, not a String.

  # ── Field normalisation ────────────────────────────────────────────────────
  # logback MDC fields arrive as camelCase; normalise to snake_case for
  # consistent OpenSearch field naming.
  mutate {
    rename => {
      "testId"     => "test_id"
      "testClass"  => "test_class"
      "testMethod" => "test_method"
      "traceId"    => "trace_id"
      "logger_name" => "logger"
      "thread_name" => "thread"
    }

    # Ensure required fields always exist — empty string if MDC not set
    # (happens for framework/infra log lines outside a test context).
    add_field => { "[@metadata][index_date]" => "%{+YYYY.MM.dd}" }
  }

  # ── Strip Logback internals not useful in OpenSearch ──────────────────────
  mutate {
    remove_field => ["@version", "level_value", "port", "host"]
  }
}

output {
  opensearch {
    hosts                        => ["${OPENSEARCH_HOST:opensearch}:${OPENSEARCH_PORT:9200}"]
    index                        => "test_execution_logs-%{[@metadata][index_date]}"
    ssl_certificate_verification => false
    # We apply our own index template via LogSearchService on startup —
    # disable the plugin's built-in ECS template (not compatible with OpenSearch 3.x)
    manage_template              => false
    # security is disabled locally; for production add user/password here:
    # user     => "${OPENSEARCH_USER:}"
    # password => "${OPENSEARCH_PASSWORD:}"
  }

  # Uncomment for pipeline debugging:
  # stdout { codec => rubydebug }
}
