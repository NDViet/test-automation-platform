global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'platform-ingestion'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['platform-ingestion:8081']
    relabel_configs:
      - target_label: service
        replacement: platform-ingestion

  - job_name: 'platform-analytics'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['platform-analytics:8082']
    relabel_configs:
      - target_label: service
        replacement: platform-analytics

  - job_name: 'platform-integration'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['platform-integration:8083']
    relabel_configs:
      - target_label: service
        replacement: platform-integration

  - job_name: 'platform-ai'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['platform-ai:8084']
    relabel_configs:
      - target_label: service
        replacement: platform-ai

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
