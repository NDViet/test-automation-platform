# ──────────────────────────────────────────────────────────────────────────────
# Platform SDK — local docker-compose stack
#
# Ingestion service runs on http://localhost:8081
# Swagger UI:  http://localhost:8081/swagger-ui/index.html
#
# Create an API key before running tests:
#
#   curl -s -X POST http://localhost:8081/api/v1/keys \
#        -H 'Content-Type: application/json' \
#        -d '{"teamId":"team-the-internet","name":"onboard-key","description":"Onboarding example"}'
#
#   Copy the returned `key` value below.
#   The key looks like:  plat_xxxxxxxx.yyyyyyyy...
#
# Alternatively override via env vars before running mvn test:
#   export PLATFORM_URL=http://localhost:8081
#   export PLATFORM_API_KEY=plat_xxxxxxxx.yyyy...
#   export PLATFORM_TEAM_ID=team-the-internet
#   export PLATFORM_PROJECT_ID=proj-the-internet
# ──────────────────────────────────────────────────────────────────────────────

platform.url=http://localhost:8081
# Local stack runs with API_KEY_AUTH_ENABLED=false — any non-empty value works.
# For production: set API_KEY_AUTH_ENABLED=true and provide a real API key.
platform.api-key=dev-local-no-auth
platform.team-id=team-the-internet
platform.project-id=proj-the-internet
platform.environment=local
