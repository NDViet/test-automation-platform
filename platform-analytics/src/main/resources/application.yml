spring:
  application:
    name: platform-analytics
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/platform}
    username: ${DB_USERNAME:platform}
    password: ${DB_PASSWORD:platform}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: platform-analytics
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.platform.common.dto"
        spring.json.use.type.headers: false

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: platform-analytics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

platform:
  analytics:
    gate:
      min-pass-rate: ${GATE_MIN_PASS_RATE:0.80}
      max-new-failures: ${GATE_MAX_NEW_FAILURES:10}
    alerts:
      slack-webhook-url: ${SLACK_WEBHOOK_URL:}
      rules:
        - name: "High Failure Rate"
          metric: PASS_RATE_BELOW
          threshold: 0.80
          severity: HIGH
          enabled: true
        - name: "Failure Spike"
          metric: NEW_FAILURES_ABOVE
          threshold: 10
          severity: MEDIUM
          enabled: true
        - name: "Broken Tests Spike"
          metric: BROKEN_TESTS_ABOVE
          threshold: 5
          severity: HIGH
          enabled: true

opensearch:
  host: ${OPENSEARCH_HOST:localhost}
  port: ${OPENSEARCH_PORT:9200}

logging:
  level:
    com.platform: INFO
    org.springframework.kafka: WARN
