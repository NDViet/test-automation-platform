services:

  postgres:
    image: postgres:17
    container_name: platform-postgres
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.2.0
    container_name: platform-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:8.6.1
    container_name: platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:3.5.0
    container_name: platform-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Platform@123!
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  logstash:
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:8.9.0
    container_name: platform-logstash
    ports:
      - "5044:5044"    # TCP input — logstash-logback-encoder
      - "9600:9600"    # Logstash monitoring API
    volumes:
      - ./infrastructure/logstash/pipeline:/usr/share/logstash/pipeline
      - ./infrastructure/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml
    environment:
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  loki:
    image: grafana/loki:3.5.0
    container_name: platform-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  promtail:
    image: grafana/promtail:3.5.0
    container_name: platform-promtail
    volumes:
      - ./infrastructure/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.4.0
    container_name: platform-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
      GF_INSTALL_PLUGINS: "grafana-opensearch-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: platform-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  influxdb:
    image: influxdb:1.8
    container_name: platform-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Runs all Flyway migrations before any platform service starts.
  # Idempotent — safe to run on every `docker compose up`.
  # First-time users get the full schema without needing to start the Spring Boot services.
  db-migrate:
    image: flyway/flyway:11
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/platform
      FLYWAY_USER: platform
      FLYWAY_PASSWORD: platform
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_BASELINE_ON_MIGRATE: "true"
    volumes:
      - ./platform-core/src/main/resources/db/migration:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Platform services
  platform-analytics:
    image: ghcr.io/ndviet/platform-analytics:master
    build:
      context: .
      dockerfile: platform-analytics/Dockerfile
    container_name: platform-analytics
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/platform
      DB_USERNAME: platform
      DB_PASSWORD: platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    profiles:
      - services

  platform-integration:
    image: ghcr.io/ndviet/platform-integration:master
    build:
      context: .
      dockerfile: platform-integration/Dockerfile
    container_name: platform-integration
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/platform
      DB_USERNAME: platform
      DB_PASSWORD: platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    profiles:
      - services

  platform-ai:
    image: ghcr.io/ndviet/platform-ai:master
    build:
      context: .
      dockerfile: platform-ai/Dockerfile
    container_name: platform-ai
    ports:
      - "8084:8084"
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      DATASOURCE_USERNAME: platform
      DATASOURCE_PASSWORD: platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      AI_PROVIDER: ${AI_PROVIDER:-claude}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    profiles:
      - services

  platform-ingestion:
    image: ghcr.io/ndviet/platform-ingestion:master
    build:
      context: .
      dockerfile: platform-ingestion/Dockerfile
    container_name: platform-ingestion
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/platform
      DB_USERNAME: platform
      DB_PASSWORD: platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: docker
      # Disable API key auth in local dev — set to true + create a key for production
      API_KEY_AUTH_ENABLED: "false"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    profiles:
      - services   # only start with: docker compose --profile services up

  platform-portal:
    image: ghcr.io/ndviet/platform-portal:master
    build:
      context: .
      dockerfile: platform-portal/Dockerfile
    container_name: platform-portal
    ports:
      - "8085:8085"
    environment:
      INGESTION_URL: http://platform-ingestion:8081
      ANALYTICS_URL: http://platform-analytics:8082
      INTEGRATION_URL: http://platform-integration:8083
      AI_URL: http://platform-ai:8084
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - platform-ingestion
      - platform-analytics
    profiles:
      - services

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  opensearch_data:
  logstash_data:
  grafana_data:
  prometheus_data:
  loki_data:
  influxdb_data:
