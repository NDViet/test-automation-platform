# Shared auth/RBAC env injected into every Spring service (portal + backends).
# PLATFORM_JWT_SECRET MUST be identical across services so a token minted by the portal
# verifies everywhere; if unset, each service derives its own random secret and cross-service
# JWT verification fails. PLATFORM_SECURITY_ENABLED flips capability enforcement — ON by default
# after the Phase F cutover; set it to false only for break-glass/local debugging.
x-security-env: &security-env
  PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET:-}
  PLATFORM_SECURITY_ENABLED: ${PLATFORM_SECURITY_ENABLED:-true}

services:

  postgres:
    image: postgres:18
    container_name: platform-postgres
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5432:5432"
    volumes:
      # PG18 moved PGDATA to /var/lib/postgresql/18/docker; the declared VOLUME is the parent dir.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.3.1
    container_name: platform-kafka
    ports:
      - "9092:9092"   # host-machine access (e.g. kafka-ui, local producers)
      - "29092:29092" # not exposed externally; used only for intra-Docker traffic
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two data-plane listeners:
      #   PLAINTEXT  → host-machine clients connect via localhost:9092
      #   INTERNAL   → Docker-network clients connect via kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
      # The apache/kafka image also declares these two paths as VOLUMEs; name them
      # so Docker doesn't spawn anonymous (hash-named) volumes for them.
      - kafka_secrets:/etc/kafka/secrets
      - kafka_config:/mnt/shared/config
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:8.8.0
    container_name: platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:3.7.0
    container_name: platform-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Platform@123!
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: platform-minio
    command: server /data --console-address ":9001"
    ports:
      # Host 9000 is often taken by Zscaler (ZSATunnel); services reach MinIO via
      # the docker network (minio:9000), so only the host-published port changes.
      - "9100:9000"   # S3 API on host :9100 (container still 9000)
      - "9101:9001"   # MinIO Console UI — http://localhost:9101
    environment:
      MINIO_ROOT_USER: platform
      MINIO_ROOT_PASSWORD: platform123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Creates buckets and applies lifecycle rules after MinIO is ready.
  # Idempotent — safe to run on every `docker compose up`.
  minio-init:
    image: minio/mc:latest
    container_name: platform-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 platform platform123 &&
        mc mb --ignore-existing local/platform-artifacts &&
        mc mb --ignore-existing local/platform-knowledge &&
        mc mb --ignore-existing local/platform-checkpoints &&
        mc mb --ignore-existing local/platform-diffs &&
        mc ilm rule add --expire-days 30 local/platform-checkpoints &&
        mc ilm rule add --expire-days 7  local/platform-diffs &&
        echo 'MinIO buckets ready'
      "
    restart: "no"

  logstash:
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:8.9.0
    container_name: platform-logstash
    ports:
      - "5044:5044"    # TCP input — logstash-logback-encoder
      - "9600:9600"    # Logstash monitoring API
    volumes:
      - logstash_pipeline:/usr/share/logstash/pipeline:ro
      # Single-file config can't be a named volume (the local bind driver mounts
      # directories, not files), so this one stays an inline bind mount.
      - ./infrastructure/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - logstash_data:/usr/share/logstash/data
    environment:
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  loki:
    image: grafana/loki:3.6.12
    container_name: platform-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_config:/etc/loki:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    # No healthcheck: the loki 3.6.x image is distroless (no shell/wget/curl), so
    # there is no in-container way to probe /ready. Dependents gate on service_started.

  promtail:
    image: grafana/promtail:3.6.11
    container_name: platform-promtail
    volumes:
      - promtail_config:/etc/promtail:ro
      - promtail_positions:/var/lib/promtail
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:13.1.0
    container_name: platform-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
      GF_INSTALL_PLUGINS: "grafana-opensearch-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_provisioning:/etc/grafana/provisioning:ro
      - grafana_dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: platform-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_config:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      # Receives k6 real-time metrics via `k6 run -o experimental-prometheus-rw`
      - '--web.enable-remote-write-receiver'

  # Runs all Flyway migrations before any platform service starts.
  # Idempotent — safe to run on every `docker compose up`.
  # First-time users get the full schema without needing to start the Spring Boot services.
  db-migrate:
    # Must match the apps' bundled flyway-core (pinned to 12.9.0 in pom.xml) so the migration job
    # and the app-side validators compute the same checksum for V1.
    image: flyway/flyway:12.9
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/platform
      FLYWAY_USER: platform
      FLYWAY_PASSWORD: platform
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_BASELINE_ON_MIGRATE: "true"
    volumes:
      - db_migration:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # LiteLLM proxy — the single OpenAI-compatible gateway the platform talks to.
  # Backed by the Anthropic (Claude) API here so you can test end-to-end with a real
  # model; add more model_name routes (gpt-4o, gemini, …) in infrastructure/litellm/config.yaml.
  # Requires ANTHROPIC_API_KEY in the environment (e.g. in .env).
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: platform-litellm
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "1"]
    ports:
      - "4000:4000"   # OpenAI-compatible API — http://localhost:4000/v1
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-platform-local}
    volumes:
      - ./infrastructure/litellm/config.yaml:/etc/litellm/config.yaml:ro
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)\""
      interval: 10s
      timeout: 5s
      retries: 12
    profiles:
      - services

  # Platform services
  platform-analytics:
    image: ghcr.io/ndviet/platform-analytics:main
    build:
      context: .
      dockerfile: platform-analytics/Dockerfile
    container_name: platform-analytics
    ports:
      - "8082:8082"
    environment:
      <<: *security-env
      DB_URL: jdbc:postgresql://postgres:5432/platform
      DB_USERNAME: platform
      DB_PASSWORD: platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    profiles:
      - services

  platform-integration:
    image: ghcr.io/ndviet/platform-integration:main
    build:
      context: .
      dockerfile: platform-integration/Dockerfile
    container_name: platform-integration
    ports:
      - "8083:8083"
    environment:
      <<: *security-env
      DB_URL: jdbc:postgresql://postgres:5432/platform
      DB_USERNAME: platform
      DB_PASSWORD: platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # base64 of 32 random bytes; decrypts integration credentials. REQUIRED once credentials exist.
      PLATFORM_CRED_KEY: ${PLATFORM_CRED_KEY:-}
      # one-time, idempotent migration of legacy plaintext configs into encrypted credentials
      PLATFORM_CRED_BACKFILL_ENABLED: ${PLATFORM_CRED_BACKFILL_ENABLED:-false}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    profiles:
      - services

  platform-ai:
    image: ghcr.io/ndviet/platform-ai:main
    build:
      context: .
      dockerfile: platform-ai/Dockerfile
    container_name: platform-ai
    ports:
      - "8084:8084"
    environment:
      <<: *security-env
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      DATASOURCE_USERNAME: platform
      DATASOURCE_PASSWORD: platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # LiteLLM gateway — single OpenAI-compatible endpoint for every model.
      # Defaults to the bundled litellm container; override to use an external LiteLLM.
      # Also configurable per Org/Team/Project in the Portal (/settings/ai).
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000/v1}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-${LITELLM_MASTER_KEY:-sk-platform-local}}
      PLATFORM_STORAGE_TYPE: minio
      PLATFORM_STORAGE_ENDPOINT: http://minio:9000
      PLATFORM_STORAGE_ACCESS_KEY: platform
      PLATFORM_STORAGE_SECRET_KEY: platform123
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      litellm:
        condition: service_healthy
    profiles:
      - services

  platform-ingestion:
    image: ghcr.io/ndviet/platform-ingestion:main
    build:
      context: .
      dockerfile: platform-ingestion/Dockerfile
    container_name: platform-ingestion
    ports:
      - "8081:8081"
    environment:
      <<: *security-env
      DB_URL: jdbc:postgresql://postgres:5432/platform
      DB_USERNAME: platform
      DB_PASSWORD: platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Encrypts/decrypts integration credentials (Credential API + test-connection)
      PLATFORM_CRED_KEY: ${PLATFORM_CRED_KEY:-}
      # Key rotation: set to the OLD key for one deployment, then unset after rotation completes
      PLATFORM_CRED_KEY_PREVIOUS: ${PLATFORM_CRED_KEY_PREVIOUS:-}
      # Portal service-account API key (same value as portal's PLATFORM_PORTAL_KEY)
      PLATFORM_PORTAL_KEY: ${PLATFORM_PORTAL_KEY:-}
      SPRING_PROFILES_ACTIVE: docker
      # Local dev: leave unset (defaults to false). Production: set API_KEY_AUTH_ENABLED=true.
      API_KEY_AUTH_ENABLED: "${API_KEY_AUTH_ENABLED:-false}"
      # Blob storage — filesystem mode uses this as the root directory.
      # Mount a named volume here so traces survive container restarts/redeploys.
      PLATFORM_BLOB_DIR: /app/blobs
    volumes:
      - platform_blobs:/app/blobs
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    profiles:
      - services   # only start with: docker compose --profile services up

  platform-portal:
    image: ghcr.io/ndviet/platform-portal:main
    build:
      context: .
      dockerfile: platform-portal/Dockerfile
    container_name: platform-portal
    ports:
      - "8085:8085"
    environment:
      <<: *security-env
      INGESTION_URL: http://platform-ingestion:8081
      ANALYTICS_URL: http://platform-analytics:8082
      INTEGRATION_URL: http://platform-integration:8083
      AI_URL: http://platform-ai:8084
      AGENT_URL: http://platform-agent:8086
      # The portal owns auth/RBAC — it reads users/user_roles directly (Flyway runs in db-migrate).
      DB_URL: jdbc:postgresql://postgres:5432/platform
      DB_USERNAME: platform
      DB_PASSWORD: platform
      PLATFORM_CRED_KEY: ${PLATFORM_CRED_KEY:-}
      # Service-account key the portal sends to ingestion (same as ingestion's PLATFORM_PORTAL_KEY)
      PLATFORM_PORTAL_KEY: ${PLATFORM_PORTAL_KEY:-}
      # Shared Redis — portal subscribes to gen:progress:* events the agent publishes.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      platform-ingestion:
        condition: service_started
      platform-analytics:
        condition: service_started
      redis:
        condition: service_healthy
    profiles:
      - services

  platform-agent:
    image: ghcr.io/ndviet/platform-agent:main
    build:
      context: .
      dockerfile: platform-agent/Dockerfile
    container_name: platform-agent
    ports:
      - "8087:8086"
    environment:
      <<: *security-env
      DB_URL: jdbc:postgresql://postgres:5432/platform
      DB_USERNAME: platform
      DB_PASSWORD: platform
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # LiteLLM gateway — agents route all tiers (standard/complex/summarizer) through this.
      # Defaults to the bundled litellm container; override to use an external LiteLLM.
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000/v1}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-${LITELLM_MASTER_KEY:-sk-platform-local}}
      PLATFORM_CRED_KEY: ${PLATFORM_CRED_KEY:-}
      PLATFORM_STORAGE_TYPE: minio
      PLATFORM_STORAGE_ENDPOINT: http://minio:9000
      PLATFORM_STORAGE_ACCESS_KEY: platform
      PLATFORM_STORAGE_SECRET_KEY: platform123
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      litellm:
        condition: service_healthy
    profiles:
      - services

# Named volumes pinned to ./volume_data/<name> inside the project folder via the
# local driver's bind option. Data lives in the project tree, so backing up /
# moving to another deploy is just archiving volume_data (e.g. tar czf backup.tgz volume_data).
volumes:
  platform_blobs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/platform_blobs
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/postgres
  kafka_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/kafka
  kafka_secrets:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/kafka_secrets
  kafka_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/kafka_config
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/redis
  opensearch_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/opensearch
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/minio
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/grafana
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/prometheus
  loki_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/loki
  logstash_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/logstash
  promtail_positions:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volume_data/promtail

# Config volumes — bound (read-only at mount) to tracked files under ./infrastructure
# (and the Flyway migrations). Same named-volume style as the data volumes above, but
# these point at repo sources, not volume_data, so they are NOT part of a data backup.
  loki_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/infrastructure/loki
  prometheus_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/infrastructure/prometheus
  promtail_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/infrastructure/promtail
  logstash_pipeline:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/infrastructure/logstash/pipeline
  grafana_provisioning:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/infrastructure/grafana/provisioning
  grafana_dashboards:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/infrastructure/grafana/dashboards
  db_migration:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/platform-core/src/main/resources/db/migration
