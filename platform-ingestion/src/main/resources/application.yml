spring:
  application:
    name: platform-ingestion
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/platform}
    username: ${DB_USERNAME:platform}
    password: ${DB_PASSWORD:platform}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false


  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
        enable.idempotence: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: platform-ingestion

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

platform:
  storage:
    type: ${PLATFORM_STORAGE_TYPE:filesystem}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    region: ${MINIO_REGION:us-east-1}
    path-style: true
    filesystem-base-path: ${PLATFORM_BLOB_DIR:./blobs}
    presign-url-ttl-minutes: ${MINIO_PRESIGN_TTL:60}
  security:
    api-key:
      # Set to false in local dev to bypass API key authentication
      enabled: ${API_KEY_AUTH_ENABLED:true}
  portal:
    # Raw plat_... key value used by the portal to authenticate to this service.
    # Set PLATFORM_PORTAL_KEY to the same value on both ingestion and portal.
    # Generate: python3 -c "import secrets,base64; print('plat_'+base64.urlsafe_b64encode(secrets.token_bytes(32)).decode().rstrip('='))"
    service-key: ${PLATFORM_PORTAL_KEY:}
  cred:
    # Previous AES-256-GCM key (base64). Set during key rotation, unset after.
    key:
      previous: ${PLATFORM_CRED_KEY_PREVIOUS:}

logging:
  level:
    com.platform: INFO
    org.springframework.kafka: WARN
