# ── Platform ingestion endpoint ───────────────────────────────────────────────
# URL of the running platform-ingestion service.
platform.url=http://localhost:8081

# API key — set API_KEY_AUTH_ENABLED=false in docker-compose for local dev
# (no real key needed) or insert a real key and paste it here.
platform.api-key=dev-local-no-auth

# ── Team / project routing ────────────────────────────────────────────────────
# Must match rows in the teams / projects tables.
# Seed once:
#   INSERT INTO teams (name,slug) VALUES ('SauceDemo','team-saucedemo');
#   INSERT INTO projects (team_id,name,slug)
#     SELECT id,'SauceDemo','proj-saucedemo' FROM teams WHERE slug='team-saucedemo';
platform.team-id=team-saucedemo
platform.project-id=proj-saucedemo

# ── Execution metadata ────────────────────────────────────────────────────────
platform.environment=local
