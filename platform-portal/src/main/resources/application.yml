spring:
  application:
    name: platform-portal

server:
  port: ${SERVER_PORT:8085}

# Backend service URLs (portal BFF calls these)
portal:
  services:
    ingestion:  ${INGESTION_URL:http://localhost:8081}
    analytics:  ${ANALYTICS_URL:http://localhost:8082}
    integration: ${INTEGRATION_URL:http://localhost:8083}
    ai:         ${AI_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: platform-portal

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.platform: INFO
