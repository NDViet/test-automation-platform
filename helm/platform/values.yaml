global:
  image:
    registry: ""
    tag: latest
    pullPolicy: IfNotPresent

# Bundled PostgreSQL (disable when using external DB)
postgresql:
  enabled: true
  auth:
    database: platform
    username: platform
    password: platform

# Bundled Kafka (disable when using external Kafka)
kafka:
  enabled: true
  listeners:
    client:
      protocol: PLAINTEXT

# Shared database config (used when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  name: platform
  username: platform
  existingSecret: ""
  secretKey: password

# Shared Kafka config (used when kafka.enabled=false)
externalKafka:
  bootstrapServers: ""

platform-ingestion:
  enabled: true
  replicaCount: 2
  image:
    repository: platform-ingestion
  service:
    port: 8081
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    API_KEY_AUTH_ENABLED: "true"
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

platform-analytics:
  enabled: true
  replicaCount: 1
  image:
    repository: platform-analytics
  service:
    port: 8082
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

platform-integration:
  enabled: true
  replicaCount: 1
  image:
    repository: platform-integration
  service:
    port: 8083
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

platform-ai:
  enabled: true
  replicaCount: 1
  image:
    repository: platform-ai
  service:
    port: 8084
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  env:
    AI_REALTIME_ENABLED: "false"
  existingSecret: platform-ai-secrets  # must contain ANTHROPIC_API_KEY
