{{- if index .Values "platform-analytics" "enabled" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-analytics
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: analytics
spec:
  replicas: {{ index .Values "platform-analytics" "replicaCount" }}
  selector:
    matchLabels:
      {{- include "platform.selectorLabels" (dict "component" "platform-analytics" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "platform.selectorLabels" (dict "component" "platform-analytics" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: platform-analytics
          image: "{{ .Values.global.image.registry }}{{ index .Values "platform-analytics" "image" "repository" }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ index .Values "platform-analytics" "service" "port" }}
          env:
            - name: DB_URL
              value: {{ include "platform.databaseUrl" . | quote }}
            - name: DB_USERNAME
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ include "platform.kafkaBootstrapServers" . | quote }}
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
          resources:
            {{- toYaml (index .Values "platform-analytics" "resources") | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ index .Values "platform-analytics" "service" "port" }}
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ index .Values "platform-analytics" "service" "port" }}
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-analytics
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "platform.selectorLabels" (dict "component" "platform-analytics" "root" .) | nindent 4 }}
  ports:
    - port: {{ index .Values "platform-analytics" "service" "port" }}
      targetPort: {{ index .Values "platform-analytics" "service" "port" }}
{{- end }}
