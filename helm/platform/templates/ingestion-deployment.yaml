{{- if index .Values "platform-ingestion" "enabled" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingestion
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion
spec:
  replicas: {{ index .Values "platform-ingestion" "replicaCount" }}
  selector:
    matchLabels:
      {{- include "platform.selectorLabels" (dict "component" "platform-ingestion" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "platform.selectorLabels" (dict "component" "platform-ingestion" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: platform-ingestion
          image: "{{ .Values.global.image.registry }}{{ index .Values "platform-ingestion" "image" "repository" }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ index .Values "platform-ingestion" "service" "port" }}
          env:
            - name: DB_URL
              value: {{ include "platform.databaseUrl" . | quote }}
            - name: DB_USERNAME
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ include "platform.kafkaBootstrapServers" . | quote }}
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            {{- range $k, $v := (index .Values "platform-ingestion" "env") }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml (index .Values "platform-ingestion" "resources") | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ index .Values "platform-ingestion" "service" "port" }}
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ index .Values "platform-ingestion" "service" "port" }}
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ingestion
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "platform.selectorLabels" (dict "component" "platform-ingestion" "root" .) | nindent 4 }}
  ports:
    - port: {{ index .Values "platform-ingestion" "service" "port" }}
      targetPort: {{ index .Values "platform-ingestion" "service" "port" }}
{{- if index .Values "platform-ingestion" "autoscaling" "enabled" }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-ingestion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-ingestion
  minReplicas: {{ index .Values "platform-ingestion" "autoscaling" "minReplicas" }}
  maxReplicas: {{ index .Values "platform-ingestion" "autoscaling" "maxReplicas" }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ index .Values "platform-ingestion" "autoscaling" "targetCPUUtilizationPercentage" }}
{{- end }}
{{- end }}
