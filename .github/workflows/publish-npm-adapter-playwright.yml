name: Publish Playwright Adapter to NPMJS

on:
  push:
    branches:
      - main
    paths:
      - 'platform-adapters/js/playwright/**'
    tags:
      - 'v*'
  workflow_dispatch:

# Only one publish runs at a time — prevents version collision on rapid merges.
concurrency:
  group: publish-npm-adapter-playwright
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Build & Publish to NPMJS
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: platform-adapters/js/playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-node with registry-url writes an .npmrc that maps NODE_AUTH_TOKEN
      # to the NPMJS registry automatically.
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: platform-adapters/js/playwright/package-lock.json

      # Tagged release (v1.2.3) → publish as "latest" with exact version.
      # Master push → publish as "next" with a dev pre-release version so it
      # never conflicts with a previously published version.
      - name: Set version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "PUBLISH_TAG=latest" >> "$GITHUB_ENV"
          else
            BASE=$(node -p "require('./package.json').version" | sed 's/-.*$//')
            VERSION="${BASE}-next.${GITHUB_SHA::7}"
            echo "PUBLISH_TAG=next" >> "$GITHUB_ENV"
          fi
          echo "Setting version: $VERSION (tag: ${PUBLISH_TAG:-next})"
          npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript → dist/)
        run: npm run build

      # Verify the dist/ output is present before publishing.
      - name: Verify dist output
        run: |
          echo "Contents of dist/:"
          ls -la dist/
          test -f dist/index.js   || (echo "ERROR: dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "ERROR: dist/index.d.ts missing" && exit 1)

      # publishConfig.registry in package.json points to GitHub Packages.
      # Override it here so this workflow publishes to NPMJS instead.
      - name: Override publishConfig registry
        run: npm pkg set publishConfig.registry=https://registry.npmjs.org

      - name: Publish to NPMJS
        run: npm publish --access public --tag "$PUBLISH_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write publish summary
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Published \`${PKG_NAME}@${PKG_VERSION}\`

          | Field | Value |
          |---|---|
          | Package | \`${PKG_NAME}\` |
          | Version | \`${PKG_VERSION}\` |
          | Registry | NPMJS (https://www.npmjs.com) |
          | Dist-tag | \`${PUBLISH_TAG}\` |
          | Trigger | \`${{ github.event_name }}\` on \`${{ github.ref_name }}\` |

          ### Install

          \`\`\`bash
          # stable release
          npm install ${PKG_NAME}@latest
          # pre-release / next
          npm install ${PKG_NAME}@next
          \`\`\`

          ### playwright.config.ts

          \`\`\`typescript
          import type { PlaywrightTestConfig } from '@playwright/test';
          const config: PlaywrightTestConfig = {
            reporter: [
              ['list'],
              ['${PKG_NAME}', {
                endpoint:  process.env.PLATFORM_URL,
                apiKey:    process.env.PLATFORM_API_KEY,
                teamId:    'your-team',
                projectId: 'your-project',
              }],
            ],
          };
          export default config;
          \`\`\`
          EOF
